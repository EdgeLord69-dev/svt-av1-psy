name: CI build

on:
  push:
    branches: [ "master", "3.0.0-rebase" ]
  pull_request:
    branches: [ "master", "testing" ]

jobs:
  build:
    name: Ubuntu (Clang)
    runs-on: ubuntu-latest
    steps:
      - name: DOVI
        uses: GuillaumeFalourd/clone-github-repo-action@v2.3
        with:
          depth: 1
          branch: 'main'
          owner: 'quietvoid'
          repository: 'dovi_tool'
          
      - name: cargo-c
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
        run: |
          cd dovi_tool
          cargo install cargo-c
          cargo cinstall --release
    - uses: actions/checkout@v4
    - uses: ilammy/setup-nasm@v1
    - run: git fetch --prune --unshallow
    - name: Ubuntu/Mac OS X
      run: |
        cd Build/linux
        ./build.sh jobs=$(nproc) cc=clang cxx=clang++ enable-lto static native
    - name: Test
      uses: actions/upload-artifact@v4
      with:
        name: SvtAv1EncApp
        path: /home/runner/work/svt-av1-psy/svt-av1-psy/Bin/Release/SvtAv1EncApp
